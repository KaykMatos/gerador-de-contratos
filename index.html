  <script>
    if (!window.jspdf) {
      document.getElementById('contractForm').addEventListener('submit', function(e) {
        e.preventDefault();
        alert('Erro: biblioteca jsPDF nao carregou. Verifique sua conexao com a internet e recarregue a pagina.');
      });
      throw new Error('jsPDF nao carregou');
    }
    const { jsPDF } = window.jspdf;

    /* ================================================================
       HELPERS
       ================================================================ */
    function formatDateBR(dateStr) {
      if (!dateStr) return '';
      const [y, m, d] = dateStr.split('-');
      const months = [
        'janeiro','fevereiro','marco','abril','maio','junho',
        'julho','agosto','setembro','outubro','novembro','dezembro'
      ];
      return `${parseInt(d)} de ${months[parseInt(m) - 1]} de ${y}`;
    }

    function showToast(msg, isError) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.background = isError ? '#d94452' : '#1a3c5e';
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3500);
    }

    /* ================================================================
       MASCARA CPF / CNPJ
       Digita numeros e a mascara se aplica automaticamente.
       Ate 11 digitos = CPF (000.000.000-00)
       12+ digitos   = CNPJ (00.000.000/0000-00)
       ================================================================ */
    function applyCpfCnpjMask(value) {
      const digits = value.replace(/\D/g, '').slice(0, 14);
      if (digits.length <= 11) {
        // CPF: 000.000.000-00
        return digits
          .replace(/(\d{3})(\d)/, '$1.$2')
          .replace(/(\d{3})(\d)/, '$1.$2')
          .replace(/(\d{3})(\d{1,2})$/, '$1-$2');
      }
      // CNPJ: 00.000.000/0000-00
      return digits
        .replace(/(\d{2})(\d)/, '$1.$2')
        .replace(/(\d{3})(\d)/, '$1.$2')
        .replace(/(\d{3})(\d)/, '$1/$2')
        .replace(/(\d{4})(\d{1,2})$/, '$1-$2');
    }

    document.querySelectorAll('#cpfContratante, #cpfContratado').forEach(input => {
      input.addEventListener('input', function () {
        const pos = this.selectionStart;
        const oldLen = this.value.length;
        this.value = applyCpfCnpjMask(this.value);
        const newLen = this.value.length;
        const newPos = pos + (newLen - oldLen);
        this.setSelectionRange(newPos, newPos);
      });
    });

    /* ================================================================
       VALIDACAO CPF (digitos verificadores reais)
       ================================================================ */
    function validarCPF(cpf) {
      const nums = cpf.replace(/\D/g, '');
      if (nums.length !== 11) return false;
      // rejeitar sequencias iguais (000.000.000-00, 111... etc)
      if (/^(\d)\1{10}$/.test(nums)) return false;

      // primeiro digito verificador
      let soma = 0;
      for (let i = 0; i < 9; i++) soma += parseInt(nums[i]) * (10 - i);
      let resto = (soma * 10) % 11;
      if (resto === 10) resto = 0;
      if (resto !== parseInt(nums[9])) return false;

      // segundo digito verificador
      soma = 0;
      for (let i = 0; i < 10; i++) soma += parseInt(nums[i]) * (11 - i);
      resto = (soma * 10) % 11;
      if (resto === 10) resto = 0;
      if (resto !== parseInt(nums[10])) return false;

      return true;
    }

    /* ================================================================
       VALIDACAO CNPJ (digitos verificadores reais)
       ================================================================ */
    function validarCNPJ(cnpj) {
      const nums = cnpj.replace(/\D/g, '');
      if (nums.length !== 14) return false;
      if (/^(\d)\1{13}$/.test(nums)) return false;

      const pesos1 = [5,4,3,2,9,8,7,6,5,4,3,2];
      const pesos2 = [6,5,4,3,2,9,8,7,6,5,4,3,2];

      let soma = 0;
      for (let i = 0; i < 12; i++) soma += parseInt(nums[i]) * pesos1[i];
      let resto = soma % 11;
      const d1 = resto < 2 ? 0 : 11 - resto;
      if (parseInt(nums[12]) !== d1) return false;

      soma = 0;
      for (let i = 0; i < 13; i++) soma += parseInt(nums[i]) * pesos2[i];
      resto = soma % 11;
      const d2 = resto < 2 ? 0 : 11 - resto;
      if (parseInt(nums[13]) !== d2) return false;

      return true;
    }

    function validarCpfCnpj(value) {
      const digits = value.replace(/\D/g, '');
      if (digits.length <= 11) return validarCPF(value);
      return validarCNPJ(value);
    }

    /* ================================================================
       VALIDACAO DO FORMULARIO
       ================================================================ */
    function setFieldError(id, msg) {
      const el = document.getElementById(id);
      const errEl = document.getElementById('err-' + id);
      if (msg) {
        el.classList.add('invalid');
        errEl.textContent = msg;
        errEl.classList.add('visible');
      } else {
        el.classList.remove('invalid');
        errEl.textContent = '';
        errEl.classList.remove('visible');
      }
    }

    function clearAllErrors() {
      document.querySelectorAll('.invalid').forEach(el => el.classList.remove('invalid'));
      document.querySelectorAll('.field-error').forEach(el => {
        el.textContent = '';
        el.classList.remove('visible');
      });
    }

    // Limpar erro individual ao digitar
    document.querySelectorAll('#contractForm input, #contractForm select, #contractForm textarea').forEach(el => {
      el.addEventListener('input', function () {
        setFieldError(this.id, '');
      });
      el.addEventListener('change', function () {
        setFieldError(this.id, '');
      });
    });

    /* ================================================================
       SET TODAY
       ================================================================ */
    document.getElementById('data').valueAsDate = new Date();

    /* ================================================================
       FORM SUBMIT
       ================================================================ */
    document.getElementById('contractForm').addEventListener('submit', function (e) {
      e.preventDefault();
      clearAllErrors();

      const fields = {
        contratante: document.getElementById('contratante').value.trim(),
        cpfContratante: document.getElementById('cpfContratante').value.trim(),
        contratado: document.getElementById('contratado').value.trim(),
        cpfContratado: document.getElementById('cpfContratado').value.trim(),
        servico: document.getElementById('servico').value.trim(),
        valor: document.getElementById('valor').value.trim(),
        pagamento: document.getElementById('pagamento').value,
        prazo: document.getElementById('prazo').value.trim(),
        data: document.getElementById('data').value,
      };

      let valid = true;

      // campos obrigatorios
      if (!fields.contratante) { setFieldError('contratante', 'Informe o nome do contratante'); valid = false; }
      if (!fields.contratado)  { setFieldError('contratado', 'Informe o nome do contratado'); valid = false; }
      if (!fields.servico)     { setFieldError('servico', 'Descreva o servico'); valid = false; }
      if (!fields.valor)       { setFieldError('valor', 'Informe o valor'); valid = false; }
      if (!fields.pagamento)   { setFieldError('pagamento', 'Selecione a forma de pagamento'); valid = false; }
      if (!fields.prazo)       { setFieldError('prazo', 'Informe o prazo de entrega'); valid = false; }
      if (!fields.data)        { setFieldError('data', 'Selecione a data do contrato'); valid = false; }

      // validacao CPF/CNPJ contratante
      if (!fields.cpfContratante) {
        setFieldError('cpfContratante', 'Informe o CPF ou CNPJ');
        valid = false;
      } else if (!validarCpfCnpj(fields.cpfContratante)) {
        const digits = fields.cpfContratante.replace(/\D/g, '');
        if (digits.length <= 11) {
          setFieldError('cpfContratante', 'CPF invalido. Verifique os digitos');
        } else {
          setFieldError('cpfContratante', 'CNPJ invalido. Verifique os digitos');
        }
        valid = false;
      }

      // validacao CPF/CNPJ contratado
      if (!fields.cpfContratado) {
        setFieldError('cpfContratado', 'Informe o CPF ou CNPJ');
        valid = false;
      } else if (!validarCpfCnpj(fields.cpfContratado)) {
        const digits = fields.cpfContratado.replace(/\D/g, '');
        if (digits.length <= 11) {
          setFieldError('cpfContratado', 'CPF invalido. Verifique os digitos');
        } else {
          setFieldError('cpfContratado', 'CNPJ invalido. Verifique os digitos');
        }
        valid = false;
      }

      if (!valid) {
        showToast('Corrija os campos destacados em vermelho', true);
        // scroll ate o primeiro campo com erro
        const firstErr = document.querySelector('.invalid');
        if (firstErr) firstErr.scrollIntoView({ behavior: 'smooth', block: 'center' });
        return;
      }

      try {
        buildPreview(fields);
        generatePDF(fields);
      } catch (err) {
        console.error('Erro ao gerar PDF:', err);
        showToast('Erro ao gerar o PDF. Verifique o console.', true);
      }
    });

    /* ================================================================
       PREVIEW
       ================================================================ */
    function buildPreview(f) {
      const sec = document.getElementById('previewSection');
      const box = document.getElementById('previewBox');
      const dateFmt = formatDateBR(f.data);
      box.innerHTML = `
        <h3>CONTRATO DE PRESTACAO DE SERVICOS</h3>
        <p><strong>CONTRATANTE:</strong> ${f.contratante} &mdash; CPF/CNPJ: ${f.cpfContratante}</p>
        <p><strong>CONTRATADO(A):</strong> ${f.contratado} &mdash; CPF/CNPJ: ${f.cpfContratado}</p>
        <p><strong>Servico:</strong> ${f.servico}</p>
        <p><strong>Valor:</strong> R$ ${f.valor} | <strong>Pagamento:</strong> ${f.pagamento}</p>
        <p><strong>Prazo:</strong> ${f.prazo} | <strong>Data:</strong> ${dateFmt}</p>
      `;
      sec.classList.add('active');
      sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    /* ================================================================
       PDF GENERATION
       ================================================================ */
    function generatePDF(f) {
      const doc = new jsPDF({ unit: 'mm', format: 'a4' });
      const W = doc.internal.pageSize.getWidth();
      const H = doc.internal.pageSize.getHeight();
      const marginL = 25;
      const marginR = 25;
      const contentW = W - marginL - marginR;
      let y = 0;

      const dateFmt = formatDateBR(f.data);

      /* colors */
      const navy = [26, 60, 94];
      const gold = [212, 168, 75];
      const dark = [30, 30, 47];
      const grey = [100, 100, 114];

      function needsPage(extraY) {
        if (y + extraY > H - 30) {
          doc.addPage();
          y = 25;
        }
      }

      function addParagraph(text, opts = {}) {
        const fontSize = opts.size || 11;
        const color = opts.color || dark;
        const isBold = opts.bold || false;
        const align = opts.align || 'justify';
        const indent = opts.indent || 0;

        doc.setFont('helvetica', isBold ? 'bold' : 'normal');
        doc.setFontSize(fontSize);
        doc.setTextColor(...color);

        const lines = doc.splitTextToSize(text, contentW - indent);
        for (let i = 0; i < lines.length; i++) {
          needsPage(6);
          if (align === 'center') {
            doc.text(lines[i], W / 2, y, { align: 'center' });
          } else {
            doc.text(lines[i], marginL + indent, y, { align: 'left', maxWidth: contentW - indent });
          }
          y += fontSize * 0.45;
        }
        y += 2;
      }

      /* HEADER */
      doc.setFillColor(...navy);
      doc.rect(0, 0, W, 38, 'F');
      doc.setFillColor(...gold);
      doc.rect(0, 38, W, 2, 'F');

      doc.setFont('helvetica', 'bold');
      doc.setFontSize(20);
      doc.setTextColor(255, 255, 255);
      doc.text('CONTRATO DE PRESTACAO', W / 2, 18, { align: 'center' });
      doc.text('DE SERVICOS', W / 2, 28, { align: 'center' });

      y = 52;

      /* PARTIES */
      doc.setFillColor(240, 242, 245);
      doc.roundedRect(marginL, y - 5, contentW, 22, 2, 2, 'F');
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(9);
      doc.setTextColor(...navy);
      doc.text('CONTRATANTE', marginL + 4, y + 1);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(10);
      doc.setTextColor(...dark);
      doc.text(f.contratante, marginL + 4, y + 7);
      doc.setFontSize(9);
      doc.setTextColor(...grey);
      doc.text('CPF/CNPJ: ' + f.cpfContratante, marginL + 4, y + 13);
      y += 26;

      doc.setFillColor(240, 242, 245);
      doc.roundedRect(marginL, y - 5, contentW, 22, 2, 2, 'F');
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(9);
      doc.setTextColor(...navy);
      doc.text('CONTRATADO(A)', marginL + 4, y + 1);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(10);
      doc.setTextColor(...dark);
      doc.text(f.contratado, marginL + 4, y + 7);
      doc.setFontSize(9);
      doc.setTextColor(...grey);
      doc.text('CPF/CNPJ: ' + f.cpfContratado, marginL + 4, y + 13);
      y += 30;

      doc.setDrawColor(...gold);
      doc.setLineWidth(0.5);
      doc.line(marginL, y, W - marginR, y);
      y += 10;

      /* CLAUSULAS */
      function clauseTitle(num, title) {
        needsPage(12);
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(11);
        doc.setTextColor(...navy);
        doc.text('CLAUSULA ' + num + ' - ' + title, marginL, y);
        y += 7;
      }

      clauseTitle('1a', 'DO OBJETO');
      addParagraph(
        'O presente contrato tem como objeto a prestacao dos seguintes servicos pelo(a) CONTRATADO(A) ao CONTRATANTE: ' + f.servico + '.'
      );
      addParagraph(
        'O(A) CONTRATADO(A) se compromete a executar os servicos descritos acima com qualidade, diligencia e dentro dos padroes tecnicos exigidos.'
      );
      y += 3;

      clauseTitle('2a', 'DO VALOR E FORMA DE PAGAMENTO');
      addParagraph(
        'Pelos servicos prestados, o CONTRATANTE pagara ao(a) CONTRATADO(A) o valor total de R$ ' + f.valor + ' (' + valorPorExtenso(f.valor) + ').'
      );
      addParagraph('Forma de pagamento: ' + f.pagamento + '.');
      addParagraph(
        'O atraso no pagamento implicara multa de 2% (dois por cento) sobre o valor devido, acrescido de juros de mora de 1% (um por cento) ao mes, calculados pro rata die.'
      );
      y += 3;

      clauseTitle('3a', 'DO PRAZO');
      addParagraph(
        'O prazo para a execucao completa dos servicos objeto deste contrato e de ' + f.prazo + ', contados a partir da data de assinatura deste instrumento.'
      );
      addParagraph('O prazo podera ser prorrogado mediante acordo por escrito entre as partes.');
      y += 3;

      clauseTitle('4a', 'DAS OBRIGACOES DO(A) CONTRATADO(A)');
      ['Executar os servicos conforme especificacoes acordadas neste contrato;',
       'Manter sigilo absoluto sobre informacoes confidenciais do CONTRATANTE;',
       'Comunicar imediatamente qualquer impedimento que possa afetar a execucao dos servicos;',
       'Entregar o servico dentro do prazo estipulado na Clausula 3a.'
      ].forEach(function (item, i) {
        addParagraph(String.fromCharCode(97 + i) + ') ' + item, { indent: 4 });
      });
      y += 3;

      clauseTitle('5a', 'DAS OBRIGACOES DO CONTRATANTE');
      ['Fornecer ao(a) CONTRATADO(A) todas as informacoes e materiais necessarios para execucao dos servicos;',
       'Efetuar o pagamento conforme estipulado na Clausula 2a deste contrato;',
       'Respeitar os prazos para aprovacao de etapas intermediarias, quando houver.'
      ].forEach(function (item, i) {
        addParagraph(String.fromCharCode(97 + i) + ') ' + item, { indent: 4 });
      });
      y += 3;

      clauseTitle('6a', 'DA RESCISAO');
      addParagraph('O presente contrato podera ser rescindido por qualquer das partes mediante comunicacao por escrito com antecedencia minima de 15 (quinze) dias.');
      addParagraph('Em caso de rescisao, serao devidos os valores proporcionais aos servicos ja executados ate a data da rescisao.');
      addParagraph('A parte que der causa a rescisao por descumprimento contratual ficara responsavel pelo pagamento de multa equivalente a 10% (dez por cento) do valor total do contrato.');
      y += 3;

      clauseTitle('7a', 'DA CONFIDENCIALIDADE');
      addParagraph('As partes se comprometem a manter sigilo sobre todas as informacoes confidenciais trocadas em razao deste contrato, durante sua vigencia e pelo periodo de 2 (dois) anos apos seu encerramento.');
      y += 3;

      clauseTitle('8a', 'DO FORO');
      addParagraph('Para dirimir quaisquer controversias oriundas deste contrato, as partes elegem o foro da comarca do domicilio do CONTRATANTE, com exclusao de qualquer outro, por mais privilegiado que seja.');
      y += 3;

      clauseTitle('9a', 'DAS DISPOSICOES GERAIS');
      addParagraph('Os casos omissos neste contrato serao resolvidos de comum acordo entre as partes, observando-se a legislacao vigente aplicavel.');
      addParagraph('Este contrato e composto de clausulas reciprocamente aceitas e assinadas pelas partes, produzindo seus efeitos legais.');
      y += 8;

      /* SIGNATURES */
      needsPage(55);
      addParagraph(
        'E por estarem de pleno acordo com as condicoes e termos acima estabelecidos, as partes assinam o presente contrato em 2 (duas) vias de igual teor e forma, na presenca de 2 (duas) testemunhas.',
        { align: 'left' }
      );
      y += 5;

      doc.setFont('helvetica', 'normal');
      doc.setFontSize(11);
      doc.setTextColor(...dark);
      doc.text('Local e data: _______________________, ' + dateFmt + '.', marginL, y);
      y += 20;

      const sigW = contentW / 2 - 5;

      doc.setDrawColor(...navy);
      doc.setLineWidth(0.3);
      doc.line(marginL, y, marginL + sigW, y);
      doc.line(marginL + sigW + 10, y, marginL + sigW * 2 + 10, y);
      y += 5;
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(9);
      doc.setTextColor(...navy);
      doc.text('CONTRATANTE', marginL + sigW / 2, y, { align: 'center' });
      doc.text('CONTRATADO(A)', marginL + sigW + 10 + sigW / 2, y, { align: 'center' });
      y += 4;
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(9);
      doc.setTextColor(...grey);
      doc.text(f.contratante, marginL + sigW / 2, y, { align: 'center' });
      doc.text(f.contratado, marginL + sigW + 10 + sigW / 2, y, { align: 'center' });
      y += 20;

      doc.setDrawColor(...grey);
      doc.line(marginL, y, marginL + sigW, y);
      doc.line(marginL + sigW + 10, y, marginL + sigW * 2 + 10, y);
      y += 5;
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(9);
      doc.setTextColor(...grey);
      doc.text('Testemunha 1', marginL + sigW / 2, y, { align: 'center' });
      doc.text('Testemunha 2', marginL + sigW + 10 + sigW / 2, y, { align: 'center' });
      y += 4;
      doc.text('Nome:', marginL, y);
      doc.text('Nome:', marginL + sigW + 10, y);
      y += 5;
      doc.text('CPF:', marginL, y);
      doc.text('CPF:', marginL + sigW + 10, y);

      /* FOOTER on every page */
      const totalPages = doc.internal.getNumberOfPages();
      for (let p = 1; p <= totalPages; p++) {
        doc.setPage(p);
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(8);
        doc.setTextColor(160, 160, 160);
        doc.text('Pagina ' + p + ' de ' + totalPages, W / 2, H - 10, { align: 'center' });
        doc.setDrawColor(200, 200, 200);
        doc.setLineWidth(0.2);
        doc.line(marginL, H - 15, W - marginR, H - 15);
      }

      var fileName = 'Contrato_' + f.contratante.replace(/\s+/g, '_') + '_' + f.contratado.replace(/\s+/g, '_') + '.pdf';
      doc.save(fileName);
      showToast('PDF gerado com sucesso!');
    }

    /* ================================================================
       VALOR POR EXTENSO
       ================================================================ */
    function valorPorExtenso(valor) {
      var clean = valor.replace(/[R$\s]/g, '').replace(/\./g, '').replace(',', '.');
      var num = parseFloat(clean);
      if (isNaN(num)) return valor;

      var unidades = ['', 'um', 'dois', 'tres', 'quatro', 'cinco', 'seis', 'sete', 'oito', 'nove',
        'dez', 'onze', 'doze', 'treze', 'quatorze', 'quinze', 'dezesseis', 'dezessete', 'dezoito', 'dezenove'];
      var dezenas = ['', '', 'vinte', 'trinta', 'quarenta', 'cinquenta', 'sessenta', 'setenta', 'oitenta', 'noventa'];
      var centenas = ['', 'cento', 'duzentos', 'trezentos', 'quatrocentos', 'quinhentos', 'seiscentos', 'setecentos', 'oitocentos', 'novecentos'];

      function grupo(n) {
        if (n === 0) return '';
        if (n === 100) return 'cem';
        var s = '';
        var c = Math.floor(n / 100);
        var r = n % 100;
        if (c > 0) {
          s += centenas[c];
          if (r > 0) s += ' e ';
        }
        if (r < 20) {
          s += unidades[r];
        } else {
          var d = Math.floor(r / 10);
          var u = r % 10;
          s += dezenas[d];
          if (u > 0) s += ' e ' + unidades[u];
        }
        return s;
      }

      var inteiro = Math.floor(num);
      var centavos = Math.round((num - inteiro) * 100);

      if (inteiro === 0 && centavos === 0) return 'zero reais';

      var result = '';

      if (inteiro > 0) {
        var milhoes = Math.floor(inteiro / 1000000);
        var milhares = Math.floor((inteiro % 1000000) / 1000);
        var resto = inteiro % 1000;

        var parts = [];
        if (milhoes > 0) parts.push(grupo(milhoes) + (milhoes === 1 ? ' milhao' : ' milhoes'));
        if (milhares > 0) parts.push(grupo(milhares) + ' mil');
        if (resto > 0) parts.push(grupo(resto));

        result = parts.join(', ');
        result += inteiro === 1 ? ' real' : ' reais';
      }

      if (centavos > 0) {
        if (inteiro > 0) result += ' e ';
        result += grupo(centavos) + (centavos === 1 ? ' centavo' : ' centavos');
      }

      return result;
    }
  </script>
